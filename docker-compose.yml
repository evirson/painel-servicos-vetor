services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vetor
      POSTGRES_PASSWORD: vetor
      POSTGRES_DB: painel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetor -d painel"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://vetor:vetor@postgres:5432/painel
      PORT: 4000
      AUTH_SECRET: troque-este-segredo-em-producao
      # Admin inicial criado/atualizado no boot:
      ADMIN_EMAIL: admin@vetor.com.br
      ADMIN_PASSWORD: troque-esta-senha
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    # Precisa alcançar os bancos/Firebird/Asta na rede interna.
    # Se esses recursos estiverem no host, descomente:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # URL que o NAVEGADOR usa para alcançar o worker (porta publicada no host).
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - worker

volumes:
  pgdata:
