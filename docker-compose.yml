services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetor}
      POSTGRES_DB: ${POSTGRES_DB:-painel}
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Precisa acompanhar as variáveis acima: com usuário/banco fixos aqui, uma
      # instalação que troque as credenciais nunca ficaria "healthy" e o worker
      # esperaria para sempre (depends_on: service_healthy).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetor} -d ${POSTGRES_DB:-painel}"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vetor}:${POSTGRES_PASSWORD:-vetor}@postgres:5432/${POSTGRES_DB:-painel}
      PORT: 4400
      AUTH_SECRET: troque-este-segredo-em-producao
      # Cofre de credenciais. Gere com `openssl rand -base64 32` e ponha no .env
      # da raiz. Vazia = cofre desativado (rotas /api/credenciais devolvem 503).
      SECRETS_KEY: ${SECRETS_KEY:-}
      # Admin inicial criado/atualizado no boot:
      ADMIN_EMAIL: admin@vetor.com.br
      ADMIN_PASSWORD: troque-esta-senha
      # Certificado A1 para a sonda SEFAZ (PR exige mTLS até no status serviço).
      # Coloque o .pfx em ./certs e defina estas duas no .env da raiz — ver certs/README.md.
      # Vazias = sonda roda sem certificado e reporta degraded (não abre incidente falso).
      NFE_CERT_PFX_PATH: ${NFE_CERT_PFX_PATH:-}
      NFE_CERT_PASS: ${NFE_CERT_PASS:-}
    volumes:
      # Somente-leitura: o certificado nunca entra na imagem, só é montado em runtime.
      - ./certs:/certs:ro
    ports:
      - "4400:4400"
    depends_on:
      postgres:
        condition: service_healthy
    # Precisa alcançar os bancos/Firebird/Asta na rede interna.
    # Se esses recursos estiverem no host, descomente:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # URL que o NAVEGADOR usa para alcançar o worker (porta publicada no host).
      NEXT_PUBLIC_API_URL: http://localhost:4400
    ports:
      - "3300:3300"
    depends_on:
      - worker

volumes:
  pgdata:
