# Agente do painel — roda NO SERVIDOR MONITORADO (ex.: o VPS 77.37.41.177),
# não junto com o painel.
#
# Instalação:
#   1. copie a pasta apps/agent/ para o servidor
#   2. crie o servidor no painel (POST /api/hosts) e guarde o token devolvido
#   3. crie um .env ao lado deste arquivo com PAINEL_URL e AGENT_TOKEN
#   4. docker compose up -d
services:
  agent:
    image: node:20-alpine
    restart: unless-stopped
    command: node /app/agent.js
    volumes:
      - ./agent.js:/app/agent.js:ro
      # Somente-leitura, mas atenção: acesso ao socket do docker equivale a root
      # no host. Trate este container como componente confiável.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Para ler o uso real do disco do host, e não o da camada do container.
      - /:/hostfs:ro
    environment:
      PAINEL_URL: ${PAINEL_URL:?defina PAINEL_URL no .env}
      AGENT_TOKEN: ${AGENT_TOKEN:?defina AGENT_TOKEN no .env}
      INTERVALO_SEG: ${INTERVALO_SEG:-60}
      MOUNTS: ${MOUNTS:-/hostfs}
      # Portas internas para checar de dentro (invisíveis pela internet).
      # ex.: "Postgres:5432,MySQL:3306,Redis:6379"
      PORTAS: ${PORTAS:-}
    # As portas dos bancos são checadas em 127.0.0.1 — precisa da rede do host.
    network_mode: host
